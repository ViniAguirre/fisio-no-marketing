version: "3.8"

services:
  fisio-landing:
    image: fisio-no-marketing:latest
    container_name: fisio-landing
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_WHATSAPP_LINK: ${VITE_WHATSAPP_LINK}
        VITE_SITE_URL: ${VITE_SITE_URL}
    ports:
      - "3010:80"
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    labels:
      # Labels para Traefik (se usar reverse proxy no VPS)
      # Remova esta seção se não usar Traefik
      - "traefik.enable=false"
