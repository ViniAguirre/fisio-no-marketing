version: "3.8"

services:
  fisio-landing:
    image: fisio-no-marketing:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_WHATSAPP_LINK: ${VITE_WHATSAPP_LINK}
        VITE_SITE_URL: ${VITE_SITE_URL}
    ports:
      - "3010:80"
    environment:
      - TZ=America/Sao_Paulo
      - VITE_WHATSAPP_LINK=${VITE_WHATSAPP_LINK}
      - VITE_SITE_URL=${VITE_SITE_URL}
    networks:
      - default
      - minha_rede
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=minha_rede"
        - "traefik.http.routers.fisio_lp.rule=Host(`lp.fisioterapeutanomarketing.com.br`)"
        - "traefik.http.routers.fisio_lp.entrypoints=web,websecure"
        - "traefik.http.routers.fisio_lp.tls=true"
        - "traefik.http.services.fisio_lp.loadbalancer.server.port=80"

networks:
  minha_rede:
    external: true
